<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>لعبة عاصفة النيازك</title>
    <style>
      :root {
        --bg: #050816;
        --panel: #11152b;
        --panel-2: #1a1f3a;
        --accent: #19f5c1;
        --accent-2: #34a0ff;
        --danger: #ff4d6d;
        --text: #f4f7ff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Tajawal", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: var(--text);
        background: radial-gradient(circle at 20% 10%, #15204f 0%, #050816 45%, #010206 100%);
        display: grid;
        place-items: center;
        padding: 1rem;
      }

      .game-shell {
        width: min(960px, 100%);
        display: grid;
        gap: 1rem;
      }

      .hud {
        background: linear-gradient(120deg, rgb(17 21 43 / 95%), rgb(9 12 27 / 94%));
        border: 1px solid rgb(255 255 255 / 12%);
        border-radius: 16px;
        padding: 0.75rem 1rem;
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 0.75rem;
      }

      .card {
        background: rgb(255 255 255 / 4%);
        border-radius: 12px;
        padding: 0.5rem 0.75rem;
        border: 1px solid rgb(255 255 255 / 8%);
      }

      .card b {
        display: block;
        color: #9eb7ff;
        font-size: 0.85rem;
        margin-bottom: 0.2rem;
      }

      .card span {
        font-size: 1.15rem;
        font-weight: 700;
        letter-spacing: 0.02em;
      }

      .arena {
        position: relative;
        border-radius: 18px;
        overflow: hidden;
        border: 1px solid rgb(255 255 255 / 15%);
        box-shadow: 0 24px 45px rgb(0 0 0 / 40%);
      }

      canvas {
        display: block;
        width: 100%;
        height: auto;
        background: linear-gradient(180deg, #090f2f 0%, #020512 65%, #02040b 100%);
      }

      .overlay {
        position: absolute;
        inset: 0;
        display: grid;
        place-items: center;
        text-align: center;
        background: rgb(3 5 14 / 60%);
        backdrop-filter: blur(2px);
        padding: 1rem;
      }

      .overlay-box {
        background: rgb(8 12 30 / 88%);
        border: 1px solid rgb(255 255 255 / 18%);
        border-radius: 16px;
        padding: 1.5rem;
        max-width: 520px;
      }

      .overlay h1 {
        margin: 0 0 0.7rem;
        font-size: clamp(1.4rem, 3.5vw, 2rem);
      }

      .overlay p {
        margin: 0.3rem 0;
        color: #d2ddff;
      }

      .start-btn {
        margin-top: 1rem;
        border: none;
        border-radius: 12px;
        font: inherit;
        font-weight: 700;
        padding: 0.7rem 1.3rem;
        cursor: pointer;
        color: #001318;
        background: linear-gradient(130deg, var(--accent), var(--accent-2));
      }

      .hint {
        text-align: center;
        color: #afc4ff;
        font-size: 0.95rem;
      }

      @media (max-width: 700px) {
        .hud {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }
    </style>
  </head>
  <body>
    <main class="game-shell">
      <section class="hud">
        <div class="card"><b>النقاط</b><span id="score">0</span></div>
        <div class="card"><b>المستوى</b><span id="level">1</span></div>
        <div class="card"><b>الطاقة</b><span id="lives">3</span></div>
        <div class="card"><b>أفضل نتيجة</b><span id="best">0</span></div>
      </section>
      <button class="start-btn" id="soundBtn" style="margin-top:-0.35rem;justify-self:start">🔊 الصوت: يعمل</button>

      <section class="arena">
        <canvas id="gameCanvas" width="960" height="540"></canvas>
        <div class="overlay" id="overlay">
          <div class="overlay-box">
            <h1>🚀 عاصفة النيازك</h1>
            <p>تحرك بالأسهم أو A/D واطلق بالمسطرة.</p>
            <p>اجمع 🔋 لزيادة الطاقة وتفادى اصطدام النيازك.</p>
            <button class="start-btn" id="startBtn">ابدأ الآن</button>
          </div>
        </div>
      </section>

      <p class="hint">اللعبة تعمل مباشرة بدون مكتبات خارجية. حظًا موفقًا!</p>
    </main>

    <script>
      const canvas = document.getElementById("gameCanvas");
      const ctx = canvas.getContext("2d");

      const scoreEl = document.getElementById("score");
      const levelEl = document.getElementById("level");
      const livesEl = document.getElementById("lives");
      const bestEl = document.getElementById("best");
      const overlay = document.getElementById("overlay");
      const startBtn = document.getElementById("startBtn");
      const soundBtn = document.getElementById("soundBtn");

      const keys = {};
      const stars = Array.from({ length: 120 }, () => ({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        r: Math.random() * 1.8 + 0.2,
        s: Math.random() * 0.7 + 0.2,
      }));

      let player;
      let bullets;
      let meteors;
      let pickups;
      let score;
      let level;
      let lives;
      let gameRunning = false;
      let meteorTimer = 0;
      let pickupTimer = 0;
      let shootCooldown = 0;
      let lastTime = 0;
      let best = Number(localStorage.getItem("meteor-best") || 0);
      let soundEnabled = true;
      bestEl.textContent = best;

      const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

      function playSfx(type) {
        if (!soundEnabled || audioCtx.state !== "running") return;
        const oscillator = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        oscillator.connect(gain);
        gain.connect(audioCtx.destination);

        const now = audioCtx.currentTime;
        const presets = {
          shoot: { freq: 560, end: 300, duration: 0.07, gain: 0.04, wave: "square" },
          boom: { freq: 180, end: 70, duration: 0.18, gain: 0.08, wave: "sawtooth" },
          pickup: { freq: 620, end: 900, duration: 0.12, gain: 0.05, wave: "triangle" },
          hurt: { freq: 210, end: 120, duration: 0.2, gain: 0.08, wave: "square" },
          over: { freq: 260, end: 60, duration: 0.45, gain: 0.09, wave: "sine" },
        };
        const p = presets[type] || presets.shoot;
        oscillator.type = p.wave;
        oscillator.frequency.setValueAtTime(p.freq, now);
        oscillator.frequency.exponentialRampToValueAtTime(Math.max(40, p.end), now + p.duration);
        gain.gain.setValueAtTime(p.gain, now);
        gain.gain.exponentialRampToValueAtTime(0.0001, now + p.duration);
        oscillator.start(now);
        oscillator.stop(now + p.duration);
      }

      bestEl.textContent = best;

      function resetGame() {
        player = {
          x: canvas.width / 2,
          y: canvas.height - 70,
          w: 54,
          h: 36,
          speed: 420,
        };
        bullets = [];
        meteors = [];
        pickups = [];
        score = 0;
        level = 1;
        lives = 3;
        meteorTimer = 0;
        pickupTimer = 0;
        shootCooldown = 0;
        lastTime = 0;
        updateHud();
      }

      function updateHud() {
        scoreEl.textContent = score;
        levelEl.textContent = level;
        livesEl.textContent = lives;
      }

      function spawnMeteor() {
        const size = Math.random() * 34 + 22;
        const speed = Math.random() * 70 + 90 + level * 14;
        meteors.push({
          x: Math.random() * (canvas.width - size),
          y: -size,
          r: size,
          speed,
          hp: Math.ceil(size / 22),
        });
      }

      function spawnPickup() {
        pickups.push({
          x: Math.random() * (canvas.width - 24),
          y: -30,
          w: 24,
          h: 24,
          speed: 120,
        });
      }

      function drawPlayer() {
        ctx.save();
        ctx.translate(player.x, player.y);

        ctx.fillStyle = "#37c8ff";
        ctx.beginPath();
        ctx.moveTo(0, -player.h / 2);
        ctx.lineTo(player.w / 2, player.h / 2);
        ctx.lineTo(player.w / 6, player.h / 3.2);
        ctx.lineTo(0, player.h / 1.3);
        ctx.lineTo(-player.w / 6, player.h / 3.2);
        ctx.lineTo(-player.w / 2, player.h / 2);
        ctx.closePath();
        ctx.fill();

        ctx.fillStyle = "#9afaff";
        ctx.fillRect(-4, -5, 8, 10);

        ctx.restore();
      }

      function drawBackground(delta) {
        ctx.fillStyle = "rgba(0,0,0,0.24)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.fillStyle = "rgba(210,225,255,0.9)";
        for (const star of stars) {
          star.y += star.s * delta * 45;
          if (star.y > canvas.height + 5) {
            star.y = -5;
            star.x = Math.random() * canvas.width;
          }
          ctx.beginPath();
          ctx.arc(star.x, star.y, star.r, 0, Math.PI * 2);
          ctx.fill();
        }
      }

      function drawBullet(b) {
        ctx.fillStyle = "#19f5c1";
        ctx.fillRect(b.x - 2, b.y - 12, 4, 14);
      }

      function drawMeteor(m) {
        const grad = ctx.createRadialGradient(m.x + m.r / 2, m.y + m.r / 2, 6, m.x + m.r / 2, m.y + m.r / 2, m.r);
        grad.addColorStop(0, "#ffc06d");
        grad.addColorStop(0.45, "#ff7a4b");
        grad.addColorStop(1, "#7a2a26");
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(m.x + m.r / 2, m.y + m.r / 2, m.r / 2, 0, Math.PI * 2);
        ctx.fill();
      }

      function drawPickup(p) {
        ctx.fillStyle = "#5dff8b";
        ctx.fillRect(p.x, p.y, p.w, p.h);
        ctx.fillStyle = "#083a14";
        ctx.fillRect(p.x + 10, p.y + 4, 4, 16);
        ctx.fillRect(p.x + 4, p.y + 10, 16, 4);
      }

      function intersectsRectCircle(px, py, pw, ph, cx, cy, cr) {
        const nx = Math.max(px, Math.min(cx, px + pw));
        const ny = Math.max(py, Math.min(cy, py + ph));
        const dx = cx - nx;
        const dy = cy - ny;
        return dx * dx + dy * dy <= cr * cr;
      }

      function update(delta) {
        if (keys.ArrowRight || keys.d) player.x += player.speed * delta;
        if (keys.ArrowLeft || keys.a) player.x -= player.speed * delta;
        player.x = Math.max(player.w / 2, Math.min(canvas.width - player.w / 2, player.x));

        shootCooldown -= delta;
        if ((keys[" "] || keys.Spacebar) && shootCooldown <= 0) {
          bullets.push({ x: player.x, y: player.y - player.h / 2, speed: 560 });
          playSfx("shoot");
          shootCooldown = 0.18;
        }

        meteorTimer += delta;
        pickupTimer += delta;

        const meteorRate = Math.max(0.25, 1.05 - level * 0.05);
        if (meteorTimer >= meteorRate) {
          spawnMeteor();
          meteorTimer = 0;
        }

        if (pickupTimer >= 11) {
          spawnPickup();
          pickupTimer = 0;
        }

        bullets = bullets.filter((b) => {
          b.y -= b.speed * delta;
          return b.y > -20;
        });

        meteors = meteors.filter((m) => {
          m.y += m.speed * delta;
          return m.y < canvas.height + m.r;
        });

        pickups = pickups.filter((p) => {
          p.y += p.speed * delta;
          return p.y < canvas.height + p.h;
        });

        for (const bullet of bullets) {
          for (const meteor of meteors) {
            if (
              bullet.x >= meteor.x &&
              bullet.x <= meteor.x + meteor.r &&
              bullet.y >= meteor.y &&
              bullet.y <= meteor.y + meteor.r
            ) {
              bullet.y = -99;
              meteor.hp -= 1;
              if (meteor.hp <= 0) {
                meteor.y = canvas.height + 999;
                score += 10;
                playSfx("boom");
                if (score % 120 === 0) {
                  level += 1;
                }
              }
            }
          }
        }

        for (const meteor of meteors) {
          if (
            intersectsRectCircle(
              player.x - player.w / 2,
              player.y - player.h / 2,
              player.w,
              player.h,
              meteor.x + meteor.r / 2,
              meteor.y + meteor.r / 2,
              meteor.r / 2
            )
          ) {
            meteor.y = canvas.height + 999;
            lives -= 1;
            playSfx("hurt");
          }
        }

        for (const pickup of pickups) {
          const hit =
            pickup.x < player.x + player.w / 2 &&
            pickup.x + pickup.w > player.x - player.w / 2 &&
            pickup.y < player.y + player.h / 2 &&
            pickup.y + pickup.h > player.y - player.h / 2;
          if (hit) {
            pickup.y = canvas.height + 999;
            lives = Math.min(5, lives + 1);
            score += 15;
            playSfx("pickup");
          }
        }

        if (score > best) {
          best = score;
          localStorage.setItem("meteor-best", String(best));
          bestEl.textContent = best;
        }

        if (lives <= 0) {
          gameOver();
        }

        updateHud();
      }

      function render(delta) {
        drawBackground(delta);
        drawPlayer();
        bullets.forEach(drawBullet);
        meteors.forEach(drawMeteor);
        pickups.forEach(drawPickup);
      }

      function loop(timestamp) {
        if (!gameRunning) return;
        if (!lastTime) lastTime = timestamp;
        const delta = Math.min((timestamp - lastTime) / 1000, 0.032);
        lastTime = timestamp;

        update(delta);
        render(delta);
        requestAnimationFrame(loop);
      }

      function gameOver() {
        gameRunning = false;
        overlay.style.display = "grid";
        overlay.querySelector("h1").textContent = "انتهت اللعبة";
        overlay.querySelector("p").textContent = `نتيجتك النهائية: ${score} | أفضل نتيجة: ${best}`;
        startBtn.textContent = "إعادة اللعب";
        playSfx("over");
      }

      function startGame() {
        resetGame();
        overlay.style.display = "none";
        gameRunning = true;
        requestAnimationFrame(loop);
      }

      document.addEventListener("keydown", (e) => {
        keys[e.key] = true;
      });
      document.addEventListener("keyup", (e) => {
        keys[e.key] = false;
      });

      startBtn.addEventListener("click", startGame);
      soundBtn.addEventListener("click", async () => {
        if (audioCtx.state !== "running") {
          await audioCtx.resume();
        }
        soundEnabled = !soundEnabled;
        soundBtn.textContent = soundEnabled ? "🔊 الصوت: يعمل" : "🔇 الصوت: متوقف";
      });
      resetGame();
      render(0);
    </script>
  </body>
</html>
